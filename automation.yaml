- id: '1772694408606'
  alias: solcast_update
  description: ''
  triggers:
  - trigger: time_pattern
    hours: /4
  conditions: []
  actions:
  - action: solcast_solar.update_forecasts
    metadata: {}
    data: {}
  mode: single
- id: '1772990604093'
  alias: Battery charge
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - predbat.status
    from:
    to:
    - Charging
  conditions:
  - condition: numeric_state
    entity_id: sensor.goodwe_battery_state_of_charge_2
    below: 98
  actions:
  - action: select.select_option
    metadata: {}
    target:
      entity_id: select.goodwe_ems_mode
    data:
      option: charge_battery
  mode: single
- id: '1772990931030'
  alias: Battery Discharge
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - predbat.status
    from:
    to:
    - Demand
  conditions:
  - condition: numeric_state
    entity_id: sensor.goodwe_battery_state_of_charge_2
    above: 10
  actions:
  - action: select.select_option
    metadata: {}
    target:
      entity_id: select.goodwe_ems_mode
    data:
      option: discharge_battery
  mode: single
- id: '1772991620626'
  alias: Battery standby
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - predbat.status
    from:
    to:
    - Hold charging
  conditions: []
  actions:
  - action: select.select_option
    metadata: {}
    target:
      entity_id: select.goodwe_ems_mode
    data:
      option: battery_standby
  mode: single
